<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Self Introduce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      html {
        scroll-behavior: smooth;
      }
      .hpimg {
        position: relative;
        height: 100vh;
      }

      .hpimg img {
        object-fit: cover;
        width: 100%;
        height: 100%;
      }

     
      .top-bar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 40px;
        color: whitesmoke;
        font-weight: bold;
      }

      
      .menulist {
        height: 100vh;
        background-color: white;
        display: flex;
        align-items: center;
      }

      .menuitem:hover {
        transform: scale(1.1);
        transition: 0.3s;
      }
    </style>
  </head>

  <body>
    <div class="hpimg">
      <img src="jv.jpg">

      <div class="top-bar">
        <div>Self Introduce</div>
        <a href="#menu" style="text-decoration:none; color:whitesmoke;">menu</a>
      </div>
    </div>

    <div id="menu" class="menulist">
      <div class="container text-center">
        <div class="row">

          <div class="col menuitem">
            <a href="#introduce" class="text-dark text-decoration-none">
              <h1>🙋‍♂️</h1>
              <h5>나를 소개합니다</h5>
            </a>
          </div>

          <div class="col menuitem">
            <a href="#weapon" class="text-dark text-decoration-none">
              <h1>🔫</h1>
              <h5>내가 들고 오는 무기</h5>
            </a>
          </div>

          <div class="col menuitem">
            <a href="#team" class="text-dark text-decoration-none">
              <h1>🙆‍♀️</h1>
              <h5>이런 팀원을 찾습니다</h5>
            </a>
          </div>

          <div class="col menuitem">
            <a href="#goal" class="text-dark text-decoration-none">
              <h1>🎯</h1>
              <h5>나의 한 가지 목표</h5>
            </a>
          </div>

        </div>
      </div>
    </div>

    <!-- ✅ 추가 내용 -->
    <div id="introduce" class="container mt-5">
      <h2>나를 소개합니다</h2>
      <p>내용 작성</p>
    </div>

    <div id="weapon" class="container mt-5">
      <h2>내가 들고 오는 무기</h2>
      <p>내용 작성</p>
    </div>

    <div id="team" class="container mt-5">
      <h2>이런 팀원을 찾습니다</h2>
      <p>내용 작성</p>
    </div>

    <div id="goal" class="container mt-5 mb-5">
      <h2>나의 한 가지 목표</h2>
      <p>내용 작성</p>
    </div>

  </body>
</html>
